<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" style="background:#0D1117">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#C9A84C" opacity="0.6"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .layer-bg { rx: 16; opacity: 0.06; }
      .node-box { rx: 8; stroke-width: 1.5; }
      .node-label { font-size: 12px; font-weight: 600; fill: #E6EDF3; text-anchor: middle; }
      .node-desc { font-size: 9px; fill: #8B949E; text-anchor: middle; }
      .layer-label { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; }
      .conn { fill: none; stroke-width: 1.2; marker-end: url(#arr); opacity: 0.5; }
      .conn:hover { opacity: 1; stroke-width: 2; }
      .node-box:hover { filter: url(#glow); opacity: 1; }
      .title { font-size: 24px; font-weight: 800; fill: #C9A84C; }
      .subtitle { font-size: 12px; fill: #8B949E; }
      .stat-val { font-size: 18px; font-weight: 700; fill: #C9A84C; text-anchor: middle; }
      .stat-label { font-size: 9px; fill: #8B949E; text-anchor: middle; }
    </style>
  </defs>

  <!-- Title -->
