<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="background:#0D1117">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#C9A84C" opacity="0.7"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#F85149" opacity="0.7"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#3FB950" opacity="0.7"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .state { rx: 12; stroke-width: 2; }
      .state:hover { filter: brightness(1.3); }
      .state-label { font-size: 14px; font-weight: 700; fill: #E6EDF3; text-anchor: middle; }
      .trans { fill: none; stroke-width: 1.5; }
      .trans-label { font-size: 10px; text-anchor: middle; }
      .note { rx: 8; fill: #161B22; stroke: #30363D; stroke-width: 1; }
      .note-text { font-size: 9px; fill: #8B949E; }
      .title { font-size: 22px; font-weight: 800; fill: #C9A84C; }
      .subtitle { font-size: 12px; fill: #8B949E; }
    </style>
  </defs>

  <!-- Title -->
  <text x="40" y="38" class="title">StudioLedger</text>
  <text x="225" y="38" class="subtitle">Milestone Lifecycle State Machine</text>

  <!-- States -->
  <rect x="60" y="80" width="140" height="50" class="state" fill="#1a1f2e" stroke="#6B7280"/>
  <text x="130" y="111" class="state-label">Draft</text>

  <rect x="280" y="80" width="140" height="50" class="state" fill="#2d1f5e" stroke="#8B5CF6"/>
  <text x="350" y="111" class="state-label">Proposed</text>

  <rect x="500" y="80" width="140" height="50" class="state" fill="#1e3a5f" stroke="#3B82F6"/>
  <text x="570" y="111" class="state-label">Funded</text>

  <rect x="500" y="230" width="140" height="50" class="state" fill="#3d2e0a" stroke="#F59E0B"/>
  <text x="570" y="261" class="state-label">Submitted</text>

  <rect x="280" y="230" width="140" height="50" class="state" fill="#0a2e1f" stroke="#10B981"/>
  <text x="350" y="261" class="state-label">Approved</text>

  <rect x="60" y="230" width="140" height="50" class="state" fill="#2d1f0a" stroke="#C9A84C"/>
  <text x="130" y="261" class="state-label">Released</text>

  <rect x="60" y="380" width="160" height="50" class="state" fill="#2d1f0a" stroke="#C9A84C"/>
  <text x="140" y="411" class="state-label">MCC Minted</text>

  <rect x="760" y="150" width="150" height="50" class="state" fill="#3d0a0a" stroke="#EF4444"/>
  <text x="835" y="181" class="state-label">Disputed</text>

  <rect x="760" y="300" width="150" height="50" class="state" fill="#1a2744" stroke="#58A6FF"/>
  <text x="835" y="331" class="state-label">Resolved</text>

  <rect x="760" y="420" width="150" height="50" class="state" fill="#0a2e1f" stroke="#3FB950"/>
  <text x="835" y="451" class="state-label">Refunded</text>

  <!-- Transitions — main path -->
  <path d="M200 105 L275 105" class="trans" stroke="#C9A84C" marker-end="url(#arr)"/>
  <text x="237" y="97" class="trans-label" fill="#C9A84C">propose</text>

  <path d="M420 105 L495 105" class="trans" stroke="#C9A84C" marker-end="url(#arr)"/>
  <text x="457" y="97" class="trans-label" fill="#C9A84C">fund escrow</text>

  <path d="M570 130 L570 225" class="trans" stroke="#C9A84C" marker-end="url(#arr)"/>
  <text x="595" y="182" class="trans-label" fill="#C9A84C" text-anchor="start">submit work</text>

  <path d="M500 255 L420 255" class="trans" stroke="#C9A84C" marker-end="url(#arr)"/>
  <text x="460" y="247" class="trans-label" fill="#C9A84C">approve</text>

  <path d="M280 255 L200 255" class="trans" stroke="#C9A84C" marker-end="url(#arr)"/>
  <text x="240" y="247" class="trans-label" fill="#C9A84C">release</text>

  <path d="M130 280 L140 375" class="trans" stroke="#C9A84C" marker-end="url(#arr)"/>
  <text x="110" y="335" class="trans-label" fill="#C9A84C" text-anchor="end">auto-mint T1+T4</text>

  <!-- Request changes (loop back) -->
  <path d="M540 230 C520 190, 590 150, 570 130" class="trans" stroke="#F59E0B" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="515" y="175" class="trans-label" fill="#F59E0B" text-anchor="end" font-size="9">request changes</text>

  <!-- Dispute paths -->
  <path d="M640 105 C680 130, 730 155, 755 170" class="trans" stroke="#F85149" stroke-dasharray="4 3" marker-end="url(#arr-red)"/>
  <text x="705" y="125" class="trans-label" fill="#F85149" font-size="9">dispute</text>

  <path d="M640 255 C680 230, 730 195, 755 185" class="trans" stroke="#F85149" stroke-dasharray="4 3" marker-end="url(#arr-red)"/>
  <text x="710" y="230" class="trans-label" fill="#F85149" font-size="9">dispute</text>

  <path d="M400 280 C500 310, 700 200, 755 180" class="trans" stroke="#F85149" stroke-dasharray="4 3" marker-end="url(#arr-red)"/>
  <text x="580" y="298" class="trans-label" fill="#F85149" font-size="9">dispute</text>

  <!-- Dispute → Resolved -->
  <path d="M835 200 L835 295" class="trans" stroke="#58A6FF" marker-end="url(#arr)"/>
  <text x="855" y="250" class="trans-label" fill="#58A6FF" text-anchor="start" font-size="9">panel vote</text>

  <!-- Resolved → Released / Refunded -->
  <path d="M760 325 C600 340, 200 310, 180 280" class="trans" stroke="#3FB950" marker-end="url(#arr-green)"/>
  <text x="450" y="335" class="trans-label" fill="#3FB950" font-size="9">creator wins → release</text>

  <path d="M835 350 L835 415" class="trans" stroke="#F85149" marker-end="url(#arr-red)"/>
  <text x="855" y="385" class="trans-label" fill="#F85149" text-anchor="start" font-size="9">client wins</text>

  <!-- Notes -->
  <rect x="60" y="460" width="250" height="55" class="note"/>
  <text x="75" y="480" class="note-text">0.98% fee deducted on release via</text>
  <text x="75" y="495" class="note-text">creator wallet seed decryption.</text>
  <text x="75" y="510" class="note-text">Payment signed from creator → platform.</text>

  <rect x="370" y="460" width="250" height="55" class="note"/>
  <text x="385" y="480" class="note-text">T1 = Work Credential (creator)</text>
  <text x="385" y="495" class="note-text">T4 = Client Completion (marketplace)</text>
  <text x="385" y="510" class="note-text">Metadata → IPFS via Pinata</text>

  <rect x="700" y="490" width="250" height="55" class="note"/>
  <text x="715" y="510" class="note-text">3-member arbitration panel</text>
  <text x="715" y="525" class="note-text">Votes: creator / marketplace / split</text>
  <text x="715" y="540" class="note-text">Deadlock → escalate to boss admin</text>

  <!-- Footer -->
  <text x="500" y="580" font-size="10" fill="#8B949E" text-anchor="middle" opacity="0.4">StudioLedger Milestone Lifecycle — Zoom with Cmd+/- or pinch</text>
</svg>
