<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c92a2a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#ff8a8a" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#c92a2a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <ellipse cx="300" cy="160" rx="200" ry="150" fill="url(#orb)" filter="url(#blur1)"/>
  <!-- Circuit/tech lines -->
  <g stroke="#ff4444" stroke-width="0.5" opacity="0.3">
    <line x1="50" y1="80" x2="200" y2="80"/>
    <line x1="200" y1="80" x2="220" y2="100"/>
    <line x1="220" y1="100" x2="350" y2="100"/>
    <line x1="400" y1="60" x2="550" y2="60"/>
    <line x1="550" y1="60" x2="560" y2="70"/>
    <line x1="100" y1="320" x2="250" y2="320"/>
    <line x1="250" y1="320" x2="270" y2="300"/>
    <line x1="350" y1="340" x2="500" y2="340"/>
    <circle cx="200" cy="80" r="3" fill="#ff4444"/>
    <circle cx="350" cy="100" r="3" fill="#ff4444"/>
    <circle cx="550" cy="60" r="3" fill="#ff4444"/>
    <circle cx="250" cy="320" r="3" fill="#ff4444"/>
  </g>
  <!-- Geometric figure - stylized portrait frame -->
  <g transform="translate(300,180)">
    <!-- Outer ring -->
    <circle r="90" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
    <circle r="75" fill="none" stroke="#ff4444" stroke-width="0.5" opacity="0.3"/>
    <!-- Inner figure silhouette -->
    <ellipse cx="0" cy="-15" rx="35" ry="45" fill="#2d1040" stroke="#ff6b6b" stroke-width="0.8" opacity="0.6"/>
    <!-- Head -->
    <circle cx="0" cy="-50" r="22" fill="#2a0e3e" stroke="#ff8888" stroke-width="0.8" opacity="0.7"/>
    <!-- Hair ornaments -->
    <g stroke="#ff6b6b" stroke-width="1.5" opacity="0.6">
      <line x1="-15" y1="-70" x2="-25" y2="-85"/>
      <line x1="0" y1="-73" x2="5" y2="-90"/>
      <line x1="15" y1="-70" x2="28" y2="-82"/>
      <circle cx="-25" cy="-85" r="3" fill="#ff4444" opacity="0.8"/>
      <circle cx="5" cy="-90" r="2.5" fill="#ff6b6b" opacity="0.8"/>
      <circle cx="28" cy="-82" r="3" fill="#ff4444" opacity="0.8"/>
    </g>
    <!-- Collar/kimono lines -->
    <path d="M-20,0 L-35,40 L0,35 L35,40 L20,0" fill="none" stroke="#ff6b6b" stroke-width="0.8" opacity="0.5"/>
    <!-- Decorative dots -->
    <g fill="#ff8888" opacity="0.4">
      <circle cx="-60" cy="-30" r="1.5"/>
      <circle cx="60" cy="-30" r="1.5"/>
      <circle cx="-50" cy="40" r="1.5"/>
      <circle cx="50" cy="40" r="1.5"/>
      <circle cx="-70" cy="10" r="1"/>
      <circle cx="70" cy="10" r="1"/>
    </g>
  </g>
  <!-- Floating particles -->
  <g fill="#ff6b6b" opacity="0.5">
    <circle cx="80" cy="120" r="2"/>
    <circle cx="520" cy="100" r="1.5"/>
    <circle cx="150" cy="250" r="1"/>
    <circle cx="450" cy="280" r="2"/>
    <circle cx="100" cy="350" r="1.5"/>
    <circle cx="500" cy="180" r="1"/>
    <circle cx="200" cy="50" r="1.5"/>
    <circle cx="420" cy="350" r="1"/>
  </g>
  <!-- Brand text overlay -->
  <text x="300" y="365" text-anchor="middle" fill="#ff8888" font-family="monospace" font-size="10" letter-spacing="4" opacity="0.5">BRAND CREATIVE DIRECTION · DELIVERABLE</text>
  <!-- Corner marks -->
  <g stroke="#ff4444" stroke-width="1" opacity="0.3">
    <path d="M20,20 L20,40"/>
    <path d="M20,20 L40,20"/>
    <path d="M580,20 L580,40"/>
    <path d="M580,20 L560,20"/>
    <path d="M20,380 L20,360"/>
    <path d="M20,380 L40,380"/>
    <path d="M580,380 L580,360"/>
    <path d="M580,380 L560,380"/>
  </g>
</svg>