<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCC Components — Visual Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0f1a;
    --bg-surface: rgba(255,255,255,0.04);
    --bg-elevated: rgba(255,255,255,0.07);
    --text: #f1f5f9;
    --text-secondary: #cbd5e1;
    --text-muted: #64748b;
    --text-tertiary: #475569;
    --border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding: 40px;
    min-height: 100vh;
  }

  h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }
  h2 {
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .section {
    margin-bottom: 48px;
  }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ===== MCCRow ===== */
  .mcc-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-surface);
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 6px;
  }
  .mcc-row:hover { background: rgba(255,255,255,0.05); }

  .taxon-badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .row-title {
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-sub {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
  }
  .row-sub span {
    font-size: 12px;
    color: var(--text-muted);
  }
  .row-amount {
    flex-shrink: 0;
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .row-amount .currency {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
  }
  .row-date {
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text-muted);
  }
  .row-status {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 3px 8px;
    border-radius: 4px;
    color: #22c55e;
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.3);
  }
  .row-id {
    flex-shrink: 0;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
  }
  .chevron {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    color: var(--text-tertiary);
  }

  /* ===== MCCMiniPreview ===== */
  .mcc-mini {
    margin: 12px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid;
    display: flex;
    background: rgba(0,0,0,0.25);
  }
  .mini-thumb {
    position: relative;
    flex-shrink: 0;
    width: 96px;
    height: 88px;
    overflow: hidden;
  }
  .mini-thumb .gradient-fill {
    position: absolute;
    inset: 0;
  }
  .mini-thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .mini-badge-overlay {
    position: absolute;
    bottom: 6px;
    left: 6px;
  }
  .mini-badge-overlay span {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
    background: rgba(0,0,0,0.55);
  }
  .mini-content {
    flex: 1;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }
  .mini-type {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .mini-date {
    font-size: 9px;
    color: var(--text-muted);
  }
  .mini-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mini-cat {
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mini-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .mini-footer-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mini-amount {
    font-size: 12px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .mini-amount .currency { color: var(--text-muted); }
  .mini-link {
    display: flex;
    align-items: center;
    gap: 2px;
    font-size: 9px;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .mini-link:hover { opacity: 0.75; }

  .mini-seal {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 12px;
    border-left: 1px solid;
  }
  .seal-check {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 4px;
    font-size: 14px;
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.4);
  }
  .seal-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #22c55e;
    text-align: center;
  }
  .seal-sub {
    font-size: 9px;
    color: var(--text-muted);
    text-align: center;
  }

  /* Stars */
  .stars { display: flex; align-items: center; gap: 1px; }
</style>
</head>
<body>

<h1>MCC Component Preview</h1>
<h2>MCCRow &amp; MCCMiniPreview — Dark Theme</h2>

<!-- ============ MCCRow Section ============ -->
<div class="section">
  <p class="label">MCCRow — Split-Panel List (Assets Page)</p>
  <div id="rows"></div>
</div>

<!-- ============ MCCMiniPreview Section ============ -->
<div class="section">
  <p class="label">MCCMiniPreview — Inline Badge (Contract Page)</p>
  <div id="minis"></div>
</div>

<script>
// ---- Mock data ----
const mockMCCs = [
  {
    id: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890',
    mcc_token_id: '000800005A4D3B2C1A0F9E8D7C6B5A4938271605000000000000000000000001',
    taxon: 1,
    minted_at: '2026-04-10T14:30:00Z',
    metadata_cache: {
      name: 'Brand Identity Package — Lumina Labs',
      work_title: 'Brand Identity Package — Lumina Labs',
      work_category: 'Graphic Design',
      marketplace_rating: 5,
      payment_amount: '4500',
      payment_currency: 'RLUSD',
      client_name: 'Lumina Labs',
      image: 'gradient:purple-pink',
    }
  },
  {
    id: 'b2c3d4e5-f6a7-8901-bcde-f12345678901',
    mcc_token_id: '000800005A4D3B2C1A0F9E8D7C6B5A4938271605000000000000000000000002',
    taxon: 2,
    minted_at: '2026-03-22T09:15:00Z',
    metadata_cache: {
      name: 'UI Kit Pro License',
      work_title: 'UI Kit Pro License',
      work_category: 'Digital Asset',
      marketplace_rating: 0,
      payment_amount: '120',
      payment_currency: 'XRP',
      image: 'gradient:green-teal',
    }
  },
  {
    id: 'c3d4e5f6-a7b8-9012-cdef-123456789012',
    mcc_token_id: '000800005A4D3B2C1A0F9E8D7C6B5A4938271605000000000000000000000003',
    taxon: 3,
    minted_at: '2026-04-01T18:00:00Z',
    metadata_cache: {
      name: 'Creator DAO — Gold Tier Access',
      work_title: 'Creator DAO — Gold Tier Access',
      work_category: 'Membership',
      marketplace_rating: 4,
      payment_amount: '250',
      payment_currency: 'RLUSD',
      image: 'gradient:indigo-blue',
    }
  },
  {
    id: 'd4e5f6a7-b8c9-0123-defa-234567890123',
    mcc_token_id: '000800005A4D3B2C1A0F9E8D7C6B5A4938271605000000000000000000000004',
    taxon: 4,
    minted_at: '2026-04-15T11:45:00Z',
    metadata_cache: {
      name: 'Full-Stack App — NovaPay',
      work_title: 'Full-Stack App — NovaPay',
      work_category: 'Software Development',
      marketplace_rating: 5,
      payment_amount: '12000',
      payment_currency: 'RLUSD',
      client_name: 'NovaPay Inc.',
      image: 'gradient:blue-cyan',
    }
  },
];

// ---- Constants (from components) ----
const TAXON_ROW_STYLES = {
  1: { dot: '#F4A17A', badgeBg: 'rgba(244,161,122,0.12)', badgeBorder: 'rgba(244,161,122,0.3)', badgeText: '#F4A17A', label: 'Work Credential' },
  2: { dot: '#4ADE80', badgeBg: 'rgba(74,222,128,0.12)', badgeBorder: 'rgba(74,222,128,0.3)', badgeText: '#4ADE80', label: 'License' },
  3: { dot: '#A78BFA', badgeBg: 'rgba(167,139,250,0.12)', badgeBorder: 'rgba(167,139,250,0.3)', badgeText: '#A78BFA', label: 'Access Pass' },
  4: { dot: '#60A5FA', badgeBg: 'rgba(96,165,250,0.12)', badgeBorder: 'rgba(96,165,250,0.3)', badgeText: '#60A5FA', label: 'Client Record' },
};

const TAXON_ACCENT = { 1: '#F4A17A', 2: '#4ADE80', 3: '#A78BFA', 4: '#60A5FA' };

const GRADIENTS = {
  'gradient:purple-pink':  'linear-gradient(135deg, #4C1D95 0%, #BE185D 60%, #F472B6 100%)',
  'gradient:blue-cyan':    'linear-gradient(135deg, #1E3A8A 0%, #0E7490 60%, #22D3EE 100%)',
  'gradient:orange-red':   'linear-gradient(135deg, #78350F 0%, #B45309 50%, #F97316 100%)',
  'gradient:green-teal':   'linear-gradient(135deg, #064E3B 0%, #0F766E 60%, #34D399 100%)',
  'gradient:indigo-blue':  'linear-gradient(135deg, #312E81 0%, #1D4ED8 60%, #60A5FA 100%)',
  'gradient:pastel-blue':  'linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 50%, #93C5FD 100%)',
};

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}

function displayId(mcc) {
  const datePart = mcc.minted_at.slice(0, 7);
  const idPart = mcc.id.replace(/-/g, '').slice(0, 6).toUpperCase();
  return `MCC-${datePart}-${idPart}`;
}

function starsHTML(rating, color) {
  let out = '';
  for (let s = 1; s <= 5; s++) {
    out += `<svg width="10" height="10" viewBox="0 0 24 24" fill="${s <= rating ? color : 'none'}" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  }
  return `<span class="stars">${out}</span>`;
}

function resolveGradient(image, seed) {
  if (!image) {
    const keys = Object.keys(GRADIENTS);
    const idx = seed.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % keys.length;
    return GRADIENTS[keys[idx]];
  }
  if (image.startsWith('gradient:')) return GRADIENTS[image] || GRADIENTS['gradient:orange-red'];
  return image;
}

const chevronSVG = `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
const linkSVG = `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

// ---- Render MCCRows ----
const rowsContainer = document.getElementById('rows');
mockMCCs.forEach(mcc => {
  const meta = mcc.metadata_cache;
  const title = meta.work_title || meta.name || 'Minted Craft Credential';
  const style = TAXON_ROW_STYLES[mcc.taxon] || TAXON_ROW_STYLES[1];
  const rating = meta.marketplace_rating || 0;
  const id = displayId(mcc);

  const subContent = rating > 0 ? starsHTML(rating, style.dot) : '';
  const clientOrCat = meta.client_name
    ? `<span>${meta.client_name}</span>`
    : meta.work_category
    ? `<span>${meta.work_category}</span>`
    : '';

  const amountHTML = meta.payment_amount
    ? `<span class="row-amount">${Number(meta.payment_amount).toLocaleString()} <span class="currency">${meta.payment_currency || 'RLUSD'}</span></span>`
    : '';

  rowsContainer.innerHTML += `
    <div class="mcc-row">
      <span class="taxon-badge" style="background:${style.badgeBg}; border:1px solid ${style.badgeBorder}; color:${style.badgeText};">${style.label}</span>
      <div style="min-width:0; flex:1;">
        <div class="row-title">${title}</div>
        <div class="row-sub">${subContent}${clientOrCat}</div>
      </div>
      ${amountHTML}
      <span class="row-date">${formatDate(mcc.minted_at)}</span>
      <span class="row-status">✓</span>
      <span class="row-id">${id}</span>
      ${chevronSVG}
    </div>
  `;
});

// ---- Render MCCMiniPreviews ----
const minisContainer = document.getElementById('minis');
mockMCCs.forEach(mcc => {
  const meta = mcc.metadata_cache;
  const title = meta.work_title || meta.name || 'Minted Craft Credential';
  const accent = TAXON_ACCENT[mcc.taxon] || '#F4A17A';
  const label = TAXON_ROW_STYLES[mcc.taxon]?.label || 'Token';
  const imgBg = resolveGradient(meta.image, mcc.mcc_token_id);
  const rating = meta.marketplace_rating || 0;

  const starsRow = rating > 0 ? starsHTML(rating, accent) : '';
  const amountHTML = meta.payment_amount
    ? `<span class="mini-amount">${Number(meta.payment_amount).toLocaleString()} <span class="currency">${meta.payment_currency || 'RLUSD'}</span></span>`
    : '';
  const catHTML = meta.work_category ? `<div class="mini-cat">${meta.work_category}</div>` : '';

  minisContainer.innerHTML += `
    <div class="mcc-mini" style="border-color: ${accent}33;">
      <div class="mini-thumb">
        <div class="gradient-fill" style="background: ${imgBg};"></div>
        <div class="mini-badge-overlay">
          <span style="color: ${accent}; border: 1px solid ${accent}55;">MCC</span>
        </div>
      </div>
      <div class="mini-content">
        <div>
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:2px;">
            <span class="mini-type" style="color: ${accent};">${label}</span>
            <span class="mini-date">· ${formatDate(mcc.minted_at)}</span>
          </div>
          <div class="mini-title">${title}</div>
          ${catHTML}
        </div>
        <div class="mini-footer">
          <div class="mini-footer-left">
            ${starsRow}
            ${amountHTML}
          </div>
          <a href="#" class="mini-link" style="color: ${accent};">
            ${linkSVG} xrpscan
          </a>
        </div>
      </div>
      <div class="mini-seal" style="border-color: ${accent}22;">
        <div style="text-align:center;">
          <div class="seal-check">✓</div>
          <div class="seal-label">Minted</div>
          <div class="seal-sub">on-chain</div>
        </div>
      </div>
    </div>
  `;
});
</script>
</body>
</html>
